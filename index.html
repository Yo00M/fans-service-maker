<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>饭撒牌编辑器 10.0 - 稳定导出版</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Gamja+Flower&family=Nanum+Brush+Script&family=Single+Day&family=Montserrat:wght@900&family=Bungee&family=Fredoka+One&family=Noto+Sans+KR:wght@100..900&family=Jua&family=Dongle:wght@700&family=Gaegu:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --panel-width: 420px; --accent-color: #00ffcc; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0a0a0a; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏 */
        .sidebar { width: var(--panel-width); background: #181818; padding: 20px; display: flex; flex-direction: column; gap: 15px; box-shadow: 5px 0 20px rgba(0,0,0,0.5); overflow-y: auto; }
        h3 { margin: 0; font-size: 14px; color: var(--accent-color); border-bottom: 1px solid #333; padding-bottom: 8px; text-transform: uppercase; }
        
        /* 文案库 */
        .phrase-library { background: #222; border: 1px solid #333; border-radius: 8px; padding: 10px; max-height: 180px; overflow-y: auto; }
        .phrase-item { font-size: 12px; background: #333; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .phrase-item:hover { background: #444; }

        /* 图层卡片 */
        .layer-card { background: #252525; border: 1px solid #444; border-radius: 8px; padding: 15px; position: relative; margin-top: 10px; border-left: 4px solid var(--accent-color); }
        .remove-btn { position: absolute; right: 10px; top: 10px; color: #ff4444; cursor: pointer; font-size: 18px; }
        
        .control-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
        label { font-size: 10px; color: #999; margin-bottom: 4px; display: block; }
        input, select { background: #151515; border: 1px solid #333; color: white; padding: 8px; border-radius: 4px; font-size: 12px; width: 100%; box-sizing: border-box; }

        /* 画布区 */
        .canvas-area { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; padding: 40px; overflow: auto; }
        #export-target { background-color: #000; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .text-layer { position: absolute; white-space: nowrap; transform: translate(-50%, -50%); cursor: move; }

        .add-btn { background: #333; border: 1px dashed var(--accent-color); color: var(--accent-color); padding: 12px; border-radius: 6px; text-align: center; cursor: pointer; font-weight: bold; }
        .save-btn { background: var(--accent-color); color: #000; padding: 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>1. 常用韩语饭撒库</h3>
    <div class="phrase-library" id="lib">
        <div class="phrase-item" data-val="손하트 해주세요!"><span>手指哈特</span><span style="color:#888; font-size:10px;">做个手指心</span></div>
        <div class="phrase-item" data-val="윙크 해주세요!"><span>眨眼 Wink</span><span style="color:#888; font-size:10px;">眨个眼吧</span></div>
        <div class="phrase-item" data-val="볼콕 해주세요!"><span>戳脸颊</span><span style="color:#888; font-size:10px;">戳戳脸颊</span></div>
        <div class="phrase-item" data-val="나만 봐줘!"><span>只看我</span><span style="color:#888; font-size:10px;">只看着我吧</span></div>
    </div>

    <h3>2. 全局基础设定</h3>
    <div class="control-row">
        <div><label>画布底色</label><input type="color" id="g-bg" value="#000000"></div>
        <div><label>描边颜色</label><input type="color" id="g-stroke" value="#ff00ff"></div>
    </div>
    <div>
        <label>描边粗细 (导出厚度)</label>
        <input type="range" id="g-stroke-w" min="1" max="20" value="8">
    </div>

    <div id="layers-list"></div>

    <div class="add-btn" id="add-layer">+ 添加自定义文字块</div>
    <button class="save-btn" id="save-image">导出高清 PNG 打印文件</button>
</div>

<div class="canvas-area">
    <div id="export-target" style="width:842px; height:595px;"></div>
</div>

<script>
    const list = document.getElementById('layers-list');
    const canvas = document.getElementById('export-target');
    let layerCount = 0;

    function createLayer(text = "新文案") {
        layerCount++;
        const id = `L${layerCount}`;
        const card = document.createElement('div');
        card.className = 'layer-card';
        card.id = `card-${id}`;
        card.innerHTML = `
            <span class="remove-btn" onclick="removeLayer('${id}')">×</span>
            <input type="text" class="c-text" value="${text}" oninput="refresh()">
            <div class="control-row">
                <div><label>左右(X)</label><input type="range" class="c-x" min="0" max="100" value="50" oninput="refresh()"></div>
                <div><label>上下(Y)</label><input type="range" class="c-y" min="0" max="100" value="${(layerCount*15)%80+10}" oninput="refresh()"></div>
            </div>
            <div class="control-row">
                <div><label>字号大小</label><input type="number" class="c-size" value="120" oninput="refresh()"></div>
                <div><label>文字颜色</label><input type="color" class="c-color" value="#ffff00" oninput="refresh()"></div>
            </div>
            <div class="control-row">
                <div><label>字体粗细</label><input type="range" class="c-weight" min="100" max="900" step="100" value="900" oninput="refresh()"></div>
                <div>
                    <label>字体风格</label>
                    <select class="c-font" oninput="refresh()">
                        <option value="'Black Han Sans'">超粗黑体</option>
                        <option value="'Jua'">圆润粗体</option>
                        <option value="'Dongle'">萌系窄体</option>
                        <option value="'Gaegu'">淘气手写</option>
                        <option value="'Noto Sans KR'">标准多级</option>
                    </select>
                </div>
            </div>
        `;
        list.appendChild(card);

        const el = document.createElement('div');
        el.className = 'text-layer';
        el.id = `text-${id}`;
        el.innerHTML = `<span>${text}</span>`;
        canvas.appendChild(el);
        refresh();
    }

    function removeLayer(id) {
        document.getElementById(`card-${id}`).remove();
        document.getElementById(`text-${id}`).remove();
    }

    function refresh() {
        // 同步全局底色
        canvas.style.backgroundColor = document.getElementById('g-bg').value;
        const sColor = document.getElementById('g-stroke').value;
        const sWidth = document.getElementById('g-stroke-w').value;

        // 遍历同步所有图层
        document.querySelectorAll('.layer-card').forEach(card => {
            const id = card.id.replace('card-', 'text-');
            const el = document.getElementById(id);
            const span = el.querySelector('span');
            
            span.innerText = card.querySelector('.c-text').value;
            el.style.left = card.querySelector('.c-x').value + '%';
            el.style.top = card.querySelector('.c-y').value + '%';
            el.style.fontSize = card.querySelector('.c-size').value + 'px';
            el.style.color = card.querySelector('.c-color').value;
            el.style.fontWeight = card.querySelector('.c-weight').value;
            el.style.fontFamily = card.querySelector('.c-font').value;

            // 核心修复：8方向重叠投影模拟描边，确保导出不失效
            const w = sWidth + 'px';
            span.style.textShadow = `
                ${w} ${w} 0 ${sColor}, -${w} -${w} 0 ${sColor},
                ${w} -${w} 0 ${sColor}, -${w} ${w} 0 ${sColor},
                ${w} 0 0 ${sColor}, -${w} 0 0 ${sColor},
                0 ${w} 0 ${sColor}, 0 -${w} 0 ${sColor}
            `;
        });
    }

    document.getElementById('lib').onclick = (e) => {
        const item = e.target.closest('.phrase-item');
        if(item) createLayer(item.dataset.val);
    };

    document.getElementById('add-layer').onclick = () => createLayer();
    document.getElementById('g-bg').oninput = refresh;
    document.getElementById('g-stroke').oninput = refresh;
    document.getElementById('g-stroke-w').oninput = refresh;

    document.getElementById('save-image').onclick = () => {
        // 使用 scale: 2 确保打印级高清
        html2canvas(canvas, { scale: 2, useCORS: true, backgroundColor: null }).then(c => {
            const a = document.createElement('a');
            a.download = `fansite_board_${Date.now()}.png`;
            a.href = c.toDataURL("image/png");
            a.click();
        });
    };

    // 初始加载一行
    createLayer("손하트 해주세요!");
</script>
</body>
</html>
